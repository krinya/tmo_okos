<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming soon…</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    .trombone {
      position: fixed;
      top: -60px;
      font-size: 2rem;
      z-index: 1;
      animation: fall linear forwards;
      will-change: transform;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }
    #controls {
      position: fixed;
      bottom: max(1.25rem, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: max-content;
      max-width: 90vw;
    }
    #toggle {
      appearance: none;
      border: none;
      background: #f5c518;
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    #toggle:active { transform: scale(0.96); }
    #status {
      color: #aaa;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ---------- Curtain / "coming soon" splash ---------- */
    #curtain {
      position: fixed;
      inset: 0;
      z-index: 20;
      cursor: pointer;
    }
    .panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50.5%;
      background: #0b0b0d;
      transition: transform 1.3s cubic-bezier(0.7, 0, 0.25, 1);
    }
    .panel.left  { left: 0;  border-right: 1px solid #222; }
    .panel.right { right: 0; border-left: 1px solid #222; }
    #curtain.open .panel.left  { transform: translateX(-100%); }
    #curtain.open .panel.right { transform: translateX(100%); }

    .splash {
      position: absolute;
      inset: 0;
      z-index: 21;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #fff;
      text-align: center;
      padding: 1rem;
      transition: opacity 0.6s;
    }
    #curtain.open .splash { opacity: 0; }
    .splash .title {
      font-size: clamp(2rem, 9vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .splash .count {
      font-size: clamp(3.5rem, 22vw, 9rem);
      font-weight: 900;
      line-height: 1;
      color: #f5c518;
      font-variant-numeric: tabular-nums;
    }
    .splash .sub { font-size: 0.9rem; color: #888; }
  </style>
</head>
<body>
  <img src="tmo_okos.png" alt="Proof of ownership">

  <div id="controls">
    <button id="toggle">▶ Play</button>
    <span id="status">🔊 click anywhere</span>
  </div>

  <div id="curtain">
    <div class="panel left"></div>
    <div class="panel right"></div>
    <div class="splash">
      <div class="title">Coming&nbsp;soon</div>
      <div class="count" id="count">10</div>
      <div class="sub">something very important is launching…</div>
    </div>
  </div>

  <script>
    // ---------- Sad trombone: "wah wah wah waaaah" ----------
    let ctx;
    function sadTrombone() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      const t0 = ctx.currentTime;
      const notes = [
        { f: 277.18, t: 0.00, d: 0.28 }, // C#4  wah
        { f: 261.63, t: 0.30, d: 0.28 }, // C4   wah
        { f: 246.94, t: 0.60, d: 0.28 }, // B3   wah
        { f: 233.08, t: 0.90, d: 0.90 }, // A#3  waaaah
      ];
      notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(n.f, t0 + n.t);
        osc.frequency.linearRampToValueAtTime(n.f * 0.94, t0 + n.t + n.d);
        gain.gain.setValueAtTime(0.0001, t0 + n.t);
        gain.gain.exponentialRampToValueAtTime(0.25, t0 + n.t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + n.t + n.d);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0 + n.t);
        osc.stop(t0 + n.t + n.d + 0.05);
      });
    }

    // ---------- Play 5 times with a pause between, plus play/pause control ----------
    const MAX_PLAYS = 5;
    const GAP_MS = 2600; // trombone (~1.8s) + short pause
    let playsDone = 0;
    let playing = false;
    let timer = null;

    const btn = document.getElementById('toggle');
    const status = document.getElementById('status');

    function updateStatus() {
      status.textContent = playing
        ? `Playing ${playsDone}/${MAX_PLAYS}`
        : (playsDone >= MAX_PLAYS ? 'Done' : 'Paused');
    }

    function tick() {
      if (!playing) return;
      if (playsDone >= MAX_PLAYS) {
        stop(true);
        return;
      }
      sadTrombone();
      playsDone++;
      updateStatus();
      timer = setTimeout(tick, GAP_MS);
    }

    function start() {
      if (playsDone >= MAX_PLAYS) playsDone = 0; // finished run -> restart
      playing = true;
      btn.textContent = '⏸ Pause';
      tick();
    }

    function stop(finished) {
      playing = false;
      clearTimeout(timer);
      btn.textContent = finished && playsDone >= MAX_PLAYS ? '🔁 Replay' : '▶ Play';
      updateStatus();
    }

    // ---------- Audio unlocking ----------
    // Browsers block sound until a user gesture. During the countdown, any
    // click/tap just UNLOCKS audio (so the trombone can blast the instant the
    // curtain opens). We don't start the sequence early.
    let audioUnlocked = false;
    let revealed = false;

    function unlockAudio() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      audioUnlocked = true;
    }

    function onGesture(e) {
      if (e.target === btn) return; // button handles itself
      unlockAudio();
      // If the curtain already opened but sound never started (no earlier
      // click), the first click after reveal kicks it off.
      if (revealed && !playing && playsDone === 0) start();
    }
    document.addEventListener('pointerdown', onGesture);
    document.addEventListener('keydown', onGesture);
    document.addEventListener('touchstart', onGesture);

    btn.addEventListener('click', () => {
      unlockAudio();
      playing ? stop(false) : start();
    });

    // ---------- Countdown 10 -> 0, then open the curtain ----------
    const curtain = document.getElementById('curtain');
    const countEl = document.getElementById('count');

    function reveal() {
      revealed = true;
      document.title = 'Yes, I own this domain.';
      curtain.classList.add('open');
      setTimeout(() => curtain.remove(), 1400); // after the slide finishes
      // If audio was unlocked during the countdown, blast the trombone now.
      // Otherwise it fires on the first click after the reveal.
      if (audioUnlocked) start();
    }

    let n = 10;
    countEl.textContent = n;
    const cd = setInterval(() => {
      n -= 1;
      if (n >= 0) countEl.textContent = n;
      if (n <= 0) {
        clearInterval(cd);
        setTimeout(reveal, 500);
      }
    }, 1000);

    // ---------- Rain trombones (runs behind the curtain the whole time) ----------
    function dropTrombone() {
      const el = document.createElement('div');
      el.className = 'trombone';
      el.textContent = '🎺';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
      el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }
    setInterval(dropTrombone, 200);
  </script>
</body>
</html>
