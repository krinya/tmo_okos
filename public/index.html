<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yes, I own this domain.</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎺</text></svg>">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    .trombone {
      position: fixed;
      top: -60px;
      font-size: 2rem;
      z-index: 1;
      animation: fall linear forwards;
      will-change: transform;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); }
    }
    #controls {
      position: fixed;
      bottom: max(1.25rem, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      width: max-content;
      max-width: 90vw;
    }
    #toggle {
      appearance: none;
      border: none;
      background: #f5c518;
      color: #111;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    }
    #toggle:active { transform: scale(0.96); }
    #status {
      color: #aaa;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <img src="tmo_okos.png" alt="Proof of ownership">

  <div id="controls">
    <button id="toggle">▶ Play</button>
    <span id="status">🔊 click anywhere</span>
  </div>

  <script>
    // ---------- Sad trombone: "wah wah wah waaaah" ----------
    let ctx;
    function sadTrombone() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      const t0 = ctx.currentTime;
      const notes = [
        { f: 277.18, t: 0.00, d: 0.28 }, // C#4  wah
        { f: 261.63, t: 0.30, d: 0.28 }, // C4   wah
        { f: 246.94, t: 0.60, d: 0.28 }, // B3   wah
        { f: 233.08, t: 0.90, d: 0.90 }, // A#3  waaaah
      ];
      notes.forEach(n => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(n.f, t0 + n.t);
        osc.frequency.linearRampToValueAtTime(n.f * 0.94, t0 + n.t + n.d);
        gain.gain.setValueAtTime(0.0001, t0 + n.t);
        gain.gain.exponentialRampToValueAtTime(0.25, t0 + n.t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + n.t + n.d);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0 + n.t);
        osc.stop(t0 + n.t + n.d + 0.05);
      });
    }

    // ---------- Play 5 times with a pause between, plus play/pause control ----------
    const MAX_PLAYS = 5;
    const GAP_MS = 2600; // trombone (~1.8s) + short pause
    let playsDone = 0;
    let playing = false;
    let timer = null;

    const btn = document.getElementById('toggle');
    const status = document.getElementById('status');

    function updateStatus() {
      status.textContent = playing
        ? `Playing ${playsDone}/${MAX_PLAYS}`
        : (playsDone >= MAX_PLAYS ? 'Done' : 'Paused');
    }

    function tick() {
      if (!playing) return;
      if (playsDone >= MAX_PLAYS) {
        stop(true);
        return;
      }
      sadTrombone();
      playsDone++;
      updateStatus();
      timer = setTimeout(tick, GAP_MS);
    }

    function start() {
      // if the run already finished, restart from the top
      if (playsDone >= MAX_PLAYS) playsDone = 0;
      playing = true;
      btn.textContent = '⏸ Pause';
      tick();
    }

    function stop(finished) {
      playing = false;
      clearTimeout(timer);
      btn.textContent = finished && playsDone >= MAX_PLAYS ? '🔁 Replay' : '▶ Play';
      updateStatus();
    }

    // Start the 5x sequence. Browsers block sound until the user interacts,
    // so we fire on the FIRST click/key/touch anywhere on the page — no overlay,
    // no button to hunt for. (Notes scheduled before a gesture are dropped, so
    // we only truly start once audio is unlocked.)
    let started = false;
    function kickoff() {
      if (started) return;
      started = true;
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume().then(start).catch(start);
      removeListeners();
    }

    function firstGesture(e) {
      if (e.target === btn) return; // let the button handle itself
      kickoff();
    }
    function removeListeners() {
      document.removeEventListener('pointerdown', firstGesture);
      document.removeEventListener('keydown', firstGesture);
      document.removeEventListener('touchstart', firstGesture);
    }

    document.addEventListener('pointerdown', firstGesture);
    document.addEventListener('keydown', firstGesture);
    document.addEventListener('touchstart', firstGesture);

    // Optimistically try on load — works for returning visitors the browser
    // trusts; harmless (and silently ignored) otherwise.
    window.addEventListener('load', () => {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'running') { started = true; removeListeners(); start(); }
    });

    btn.addEventListener('click', () => {
      started = true;
      removeListeners();
      if (ctx && ctx.state === 'suspended') ctx.resume();
      playing ? stop(false) : start();
    });

    // ---------- Rain trombones ----------
    function dropTrombone() {
      const el = document.createElement('div');
      el.className = 'trombone';
      el.textContent = '🎺';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
      el.style.animationDuration = (2.5 + Math.random() * 3) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 6000);
    }
    setInterval(dropTrombone, 200);
  </script>
</body>
</html>
